<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자재 위치 조회 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-box {
    width: 36px; height: 36px;
    background: var(--accent2);
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 16px; font-weight: 700;
    color: #fff; flex-shrink: 0;
  }
  header h1 {
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.5px;
  }
  header span {
    font-size: 12px; color: var(--text2);
    font-family: var(--mono);
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .sync-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); padding: 6px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer; transition: all .2s;
    font-family: var(--sans);
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-btn svg { width: 14px; height: 14px; }

  /* ── Google Sheets 설정 패널 ── */
  .sheet-panel {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: none;
    gap: 10px;
    align-items: center;
    animation: slideDown .2s ease;
  }
  .sheet-panel.open { display: flex; }
  @keyframes slideDown { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .sheet-panel label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .sheet-panel input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; font-family: var(--mono); outline: none;
    transition: border-color .2s;
  }
  .sheet-panel input:focus { border-color: var(--accent); }
  .sheet-panel input::placeholder { color: var(--text2); }
  .load-btn {
    background: var(--accent2); color: #fff;
    border: none; padding: 8px 16px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: background .2s; white-space: nowrap; font-family: var(--sans);
  }
  .load-btn:hover { background: var(--accent); }
  .sheet-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* ── Main ── */
  main { max-width: 1100px; margin: 0 auto; padding: 24px 28px; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-chip .stat-num {
    font-family: var(--mono); font-size: 18px; font-weight: 700;
    color: var(--accent);
  }
  .stat-chip .stat-label { font-size: 11px; color: var(--text2); }

  /* ── Controls ── */
  .controls {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .search-row {
    display: flex; gap: 8px; align-items: center;
  }
  .search-wrap {
    flex: 1; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--text2); pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px 10px 38px;
    border-radius: 8px; font-size: 14px; font-family: var(--sans);
    outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }
  .clear-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text2); cursor: pointer;
    padding: 4px; border-radius: 4px; display: none; line-height: 0;
  }
  .clear-btn:hover { color: var(--text); }

  .filter-row {
    display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;
  }
  .filter-group { display: flex; flex-direction: column; gap: 7px; }
  .filter-group label { font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 12px; border-radius: 20px;
    font-size: 12px; cursor: pointer; transition: all .15s;
    font-family: var(--mono); font-weight: 400; white-space: nowrap;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .chip.qty-incl.active { background: #1a3a2a; border-color: var(--green); color: var(--green); }
  .chip.qty-excl.active { background: #2a1a1a; border-color: #f85149; color: #f85149; }

  /* ── Result count ── */
  .result-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .result-count { font-size: 13px; color: var(--text2); }
  .result-count strong { color: var(--text); font-family: var(--mono); }

  /* ── Table ── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg2);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 10px 16px; text-align: left;
    font-size: 11px; font-weight: 700;
    color: var(--text2); letter-spacing: 0.8px;
    text-transform: uppercase; white-space: nowrap;
    font-family: var(--sans);
  }
  td {
    padding: 11px 16px; font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover { background: rgba(88,166,255,0.04); }

  .td-code { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .td-name { font-weight: 500; }
  .td-loc {
    font-family: var(--mono); font-size: 13px;
    color: var(--accent);
    background: rgba(31,111,235,0.1);
    border: 1px solid rgba(88,166,255,0.2);
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    letter-spacing: 1px;
  }
  .td-model {
    font-family: var(--mono); font-size: 11px;
    padding: 2px 8px; border-radius: 4px;
    display: inline-block;
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border);
  }
  .td-qty {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    text-align: right;
  }
  .qty-zero { color: var(--red); }
  .qty-low { color: var(--yellow); }
  .qty-ok { color: var(--green); }

  mark {
    background: rgba(210,153,34,0.3);
    color: var(--yellow);
    border-radius: 2px; padding: 0 1px;
  }

  /* ── Empty ── */
  .empty-state {
    padding: 60px 20px; text-align: center; color: var(--text2);
  }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* ── Status dot ── */
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
    background: var(--green); animation: pulse 2s infinite;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }
  .status-offline { background: var(--text2); animation: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 12px 18px; border-radius: 8px;
    font-size: 13px; z-index: 100;
    transform: translateY(20px); opacity: 0;
    transition: all .3s; pointer-events: none;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--green); }
  .toast.err { border-color: var(--red); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-box">WH</div>
  <div>
    <h1>자재 위치 조회 시스템</h1>
    <span id="statusText"><span class="status-dot status-offline" id="statusDot"></span>로컬 데이터</span>
  </div>
  <div class="header-right">
    <button class="sync-btn" onclick="toggleSheetPanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10h11M3 14h7M3 18h7M3 6h18M14 18l2 2 4-4"/>
      </svg>
      Google Sheets 연동
    </button>
  </div>
</header>

<!-- Google Sheets 패널 -->
<div class="sheet-panel" id="sheetPanel">
  <label>시트 ID</label>
  <input type="text" id="sheetId" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
  <button class="load-btn" onclick="loadFromSheets()">불러오기</button>
  <span id="sheetStatus" style="font-size:12px;color:var(--text2);white-space:nowrap;"></span>
</div>
<div id="sheetHint" style="display:none;padding:6px 28px 0;font-size:11px;color:var(--text2);">
  💡 Google Sheets → 파일 → 공유 → 링크가 있는 모든 사용자 (뷰어) 로 설정 후 URL의 <code style="font-family:var(--mono);color:var(--accent)">/d/</code> 뒤 ID를 붙여넣으세요.
</div>

<main>
  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="searchInput"
               placeholder="제품코드 또는 제품명으로 검색…" oninput="onSearch(this.value)" />
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>대표모델명</label>
        <div class="chip-group" id="modelChips"></div>
      </div>
      <div class="filter-group">
        <label>수량</label>
        <div class="chip-group">
          <div class="chip qty-incl active" id="qtyInclChip" onclick="toggleQty('incl')">0개 포함</div>
          <div class="chip qty-excl" id="qtyExclChip" onclick="toggleQty('excl')">0개 제외</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Result meta -->
  <div class="result-meta">
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>제품코드</th>
          <th>제품명</th>
          <th>LOCATION</th>
          <th>대표모델명</th>
          <th style="text-align:right">수량</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <p>검색 결과가 없습니다</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

COVER","location":"001a65","model":"R9BK","qty":6},{"code":"YKD0210066","name":"DUSTBIN PRIMARY FILTER","location":"001a66","model":"R9BK","qty":98},{"code":"YKD0210067","name":"2IN1 PRIMARY FILTER","location":"001a67","model":"R9BK","qty":50},{"code":"YKD0210068","name":"2in1 in Dustbin","location":"001a68","model":"R9BK","qty":16},{"code":"YKD0270001","name":"R9BK","location":"001a69","model":"R9BK","qty":0},{"code":"YKD0270002","name":"R9WH","location":"001a70","model":"R9WH","qty":0},{"code":"YKD0290001","name":"R9BK","location":"001a71","model":"R9BK","qty":0},{"code":"YKD0290002","name":"R9WH","location":"001a72","model":"R9WH","qty":0}];

/* ── State ── */
let allData = [...DEFAULT_DATA];
let query = '';
let selectedModel = 'ALL';
let qtyMode = 'incl'; // 'incl' | 'excl'

/* ── Init ── */
function init() {
  buildModelChips();
  buildStats();
  render();
}

/* ── Model chips ── */
function buildModelChips() {
  const models = ['ALL', ...new Set(allData.map(d => d.model).filter(Boolean))].sort();
  const el = document.getElementById('modelChips');
  el.innerHTML = models.map(m =>
    `<div class="chip${m === selectedModel ? ' active' : ''}" onclick="selectModel('${m}')">${m === 'ALL' ? '전체' : m}</div>`
  ).join('');
}

function selectModel(m) {
  selectedModel = m;
  buildModelChips();
  render();
}

/* ── Qty toggle ── */
function toggleQty(mode) {
  qtyMode = mode;
  document.getElementById('qtyInclChip').className = 'chip qty-incl' + (mode === 'incl' ? ' active' : '');
  document.getElementById('qtyExclChip').className = 'chip qty-excl' + (mode === 'excl' ? ' active' : '');
  render();
}

/* ── Search ── */
function onSearch(val) {
  query = val.trim();
  document.getElementById('clearBtn').style.display = query ? 'block' : 'none';
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearch('');
}

/* ── Stats ── */
function buildStats() {
  const total = allData.length;
  const stocked = allData.filter(d => d.qty > 0).length;
  const zero = allData.filter(d => d.qty === 0).length;
  const totalQty = allData.reduce((s, d) => s + (d.qty || 0), 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><span class="stat-num">${total}</span><span class="stat-label">전체 품목</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--green)">${stocked}</span><span class="stat-label">재고 있음</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--red)">${zero}</span><span class="stat-label">재고 없음</span></div>
    <div class="stat-chip"><span class="stat-num">${totalQty.toLocaleString()}</span><span class="stat-label">총 수량</span></div>
  `;
}

/* ── Filter & Render ── */
function getFiltered() {
  const q = query.toUpperCase();
  return allData.filter(d => {
    if (qtyMode === 'excl' && d.qty === 0) return false;
    if (selectedModel !== 'ALL' && d.model !== selectedModel) return false;
    if (q) {
      const matchCode = d.code && d.code.toUpperCase().includes(q);
      const matchName = d.name && d.name.toUpperCase().includes(q);
      return matchCode || matchName;
    }
    return true;
  });
}

function highlight(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(re, '<mark>$1</mark>');
}

function qtyClass(qty) {
  if (qty === 0) return 'qty-zero';
  if (qty <= 5) return 'qty-low';
  return 'qty-ok';
}

function render() {
  const rows = getFiltered();
  const q = query.toUpperCase();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  countEl.innerHTML = `<strong>${rows.length}</strong> 건 표시 중 (전체 ${allData.length}건)`;

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(d => `
    <tr>
      <td class="td-code">${highlight(d.code, q)}</td>
      <td class="td-name">${highlight(d.name, q)}</td>
      <td><span class="td-loc">${d.location || '-'}</span></td>
      <td><span class="td-model">${d.model || '-'}</span></td>
      <td class="td-qty ${qtyClass(d.qty)}">${d.qty}</td>
    </tr>
  `).join('');
}

/* ── Google Sheets ── */
function toggleSheetPanel() {
  const panel = document.getElementById('sheetPanel');
  const hint = document.getElementById('sheetHint');
  const open = panel.classList.toggle('open');
  hint.style.display = open ? 'block' : 'none';
}

async function loadFromSheets() {
  const id = document.getElementById('sheetId').value.trim();
  const status = document.getElementById('sheetStatus');
  if (!id) { showToast('시트 ID를 입력해주세요.', 'err'); return; }

  status.textContent = '⏳ 불러오는 중…';
  const url = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=0`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const csv = await res.text();
    const parsed = parseCSV(csv);
    if (parsed.length === 0) throw new Error('데이터 없음');

    allData = parsed;
    selectedModel = 'ALL';
    buildModelChips();
    buildStats();
    render();

    status.textContent = `✅ ${parsed.length}건 로드됨`;
    setOnline(true);
    showToast(`✅ ${parsed.length}건을 성공적으로 불러왔습니다.`, 'ok');
  } catch(e) {
    status.textContent = '❌ 불러오기 실패';
    showToast('불러오기 실패: 시트가 공개 공유되어 있는지 확인해주세요.', 'err');
  }
}

function parseCSV(csv) {
  const lines = csv.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
  
  // 컬럼 인덱스 자동 감지
  const ci = (names) => {
    for (const n of names) {
      const idx = headers.findIndex(h => h.includes(n));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const iCode = ci(['제품코드','코드','code']);
  const iName = ci(['제품명','name']);
  const iLoc  = ci(['location','loc','위치']);
  const iModel = ci(['대표모델','model']);
  const iQty  = ci(['수량','qty','quantity']);

  return lines.slice(1).map(line => {
    const cols = splitCSVLine(line);
    const qty = parseInt(cols[iQty]) || 0;
    return {
      code: cols[iCode]?.replace(/"/g,'').trim() || '',
      name: cols[iName]?.replace(/"/g,'').trim() || '',
      location: cols[iLoc]?.replace(/"/g,'').trim() || '',
      model: cols[iModel]?.replace(/"/g,'').trim() || '',
      qty
    };
  }).filter(d => d.code || d.name);
}

function splitCSVLine(line) {
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur);
  return cols;
}

function setOnline(on) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (on) {
    dot.className = 'status-dot';
    txt.innerHTML = '<span class="status-dot"></span>Google Sheets 연동됨';
  } else {
    dot.className = 'status-dot status-offline';
    txt.innerHTML = '<span class="status-dot status-offline"></span>로컬 데이터';
  }
}

/* ── Toast ── */
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${type ? ' '+type : ''} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.remove('show'); }, 3500);
}

/* ── Start ── */
init();
</script>
