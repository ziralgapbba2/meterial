<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>자재현황 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--white:#fff;--border:#e2e5ec;--border2:#d0d5e0;
  --navy:#1a2340;--navy2:#253050;
  --accent:#e8600a;--accent-light:#fff3eb;
  --green:#18a057;--green-bg:#edf9f2;
  --red:#d63e3e;--red-bg:#fdf0f0;
  --blue:#2563eb;--blue-bg:#eff4ff;
  --muted:#8892a4;--text:#1e2535;--text2:#4a5368;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:var(--navy);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.hdr-hex{width:30px;height:30px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.04em;}
.hdr-badge{font-size:11px;font-family:var(--mono);background:rgba(255,255,255,.12);border-radius:20px;padding:3px 10px;color:rgba(255,255,255,.7);display:none;}
.mode-wrap{margin-left:auto;display:flex;gap:4px;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;}
.mode-btn{padding:4px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .2s;color:rgba(255,255,255,.6);background:transparent;}
.mode-btn.on{background:var(--accent);color:#fff;}
.main{max-width:640px;margin:0 auto;padding:20px 16px;width:100%;}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-hdr-title{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.04em;}
.card-hdr-sub{font-size:11px;font-family:var(--mono);color:var(--muted);margin-left:auto;}
.card-body{padding:16px 18px;}
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .2s;text-align:center;}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
textarea{width:100%;height:110px;padding:12px;background:#f8f9fc;border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-family:var(--mono);color:var(--text);resize:vertical;outline:none;transition:border-color .2s;line-height:1.5;}
textarea:focus{border-color:var(--accent);background:#fff;}
textarea::placeholder{color:var(--muted);font-family:var(--sans);font-size:12px;}
.filedrop{border:2px dashed var(--border2);border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all .2s;}
.filedrop:hover{border-color:var(--accent);background:var(--accent-light);}
.filedrop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.filedrop-icon{font-size:28px;margin-bottom:8px;}
.filedrop p{font-size:13px;color:var(--muted);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;border-radius:9px;border:none;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .2s;letter-spacing:.02em;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#cc5008;}
.btn-secondary{background:var(--navy);color:#fff;}
.btn-secondary:hover{background:var(--navy2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-family:var(--mono);padding:4px 10px;border-radius:20px;}
.pill-ok{background:var(--green-bg);color:var(--green);}
.pill-err{background:var(--red-bg);color:var(--red);}
.pill-loading{background:#f0f2f7;color:var(--muted);}
.meta-box{background:var(--green-bg);border:1px solid #b8ecd4;border-radius:10px;padding:12px 16px;display:flex;gap:10px;margin-bottom:16px;}
.meta-box-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.meta-box-text{font-size:12px;color:#1a7048;line-height:1.6;}
.meta-box-text strong{font-weight:700;font-size:13px;display:block;margin-bottom:2px;}
.share-box{background:#f0f4ff;border:1px solid #c7d6f9;border-radius:10px;padding:14px 16px;margin-top:14px;}
.share-box-title{font-size:12px;font-weight:700;color:#2563eb;margin-bottom:8px;}
.share-url-box{width:100%;padding:10px 12px;background:#fff;border:1px solid #c7d6f9;border-radius:8px;font-size:11px;font-family:var(--mono);color:var(--text2);word-break:break-all;margin-bottom:10px;min-height:44px;line-height:1.6;}
.col-tags{display:flex;flex-wrap:wrap;gap:6px;}
.col-tag{padding:3px 10px;border-radius:6px;font-size:12px;font-family:var(--mono);}
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;padding:14px 44px;background:#fff;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);font-size:14px;}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--border);border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.chips{display:flex;gap:6px;margin-bottom:12px;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:var(--sans);cursor:pointer;transition:all .15s;}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.res-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;font-size:12px;color:var(--muted);margin-bottom:8px;}
.res-meta strong{color:var(--accent);font-size:15px;font-family:var(--mono);}
.result-list{display:flex;flex-direction:column;gap:10px;}
.rc{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:border-color .2s,box-shadow .2s;animation:slideUp .25s ease both;}
.rc:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(232,96,10,.12);}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rc-top{padding:14px 16px 12px;background:linear-gradient(135deg,#1a2340 0%,#253050 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.rc-part{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.06em;}
.rc-name{font-size:15px;font-weight:700;color:#fff;margin-top:3px;line-height:1.3;}
.rc-model{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}
.bin-block{flex-shrink:0;text-align:right;}
.bin-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;}
.bin-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);line-height:1.1;margin-top:2px;text-shadow:0 0 20px rgba(232,96,10,.4);}
.bin-val.empty{font-size:14px;color:rgba(255,255,255,.25);text-shadow:none;}
.rc-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.rc-field-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.rc-field-val{font-size:13px;font-weight:600;color:var(--text);}
.qty-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-family:var(--mono);font-size:12px;font-weight:700;}
.qty-pos{background:var(--green-bg);color:var(--green);}
.qty-zero{background:#f0f1f5;color:var(--muted);}
.qty-neg{background:var(--red-bg);color:var(--red);}
.abc-tag{display:inline-block;width:24px;height:24px;border-radius:6px;font-weight:900;font-size:13px;text-align:center;line-height:24px;}
.abc-A{background:#fef3c7;color:#92400e;}
.abc-B{background:var(--blue-bg);color:var(--blue);}
.abc-C{background:#f0f1f5;color:var(--muted);}
.stat-dot{display:inline-flex;align-items:center;gap:5px;font-size:12px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);}
.dot-bad{background:var(--red);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.7;}
.empty p{font-size:14px;line-height:1.7;}
.empty small{display:block;font-size:12px;color:#b0b8cc;margin-top:4px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
mark{background:rgba(232,96,10,.18);color:var(--accent);border-radius:2px;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-hex">B</div>
  <span class="hdr-title">자재현황 조회</span>
  <span class="hdr-badge" id="hdrBadge"></span>
  <div class="mode-wrap">
    <button class="mode-btn on" id="btnSearch" onclick="switchMode('search')">🔍 조회</button>
    <button class="mode-btn" id="btnAdmin" onclick="switchMode('admin')">⚙️ 관리</button>
  </div>
</header>

<div class="main">

  <!-- ── SEARCH VIEW ── -->
  <div id="viewSearch">
    <div id="stateLoading" class="empty">
      <div class="spinner"></div>
      <p>서버에서 데이터 불러오는 중...</p>
    </div>
    <div id="stateNoData" class="empty" style="display:none">
      <div class="empty-icon">📦</div>
      <p>등록된 자재 데이터가 없습니다.</p>
      <small>관리자 탭(⚙️)에서 데이터를 먼저 등록해주세요.</small>
    </div>
    <div id="stateSearch" style="display:none">
      <div id="metaLine" style="font-size:11px;color:var(--muted);font-family:var(--mono);text-align:right;margin-bottom:10px;"></div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="searchInput" placeholder="자재번호 또는 개발품명 검색..." oninput="doSearch()" autocomplete="off">
        <button class="search-clear" id="clearBtn" style="display:none" onclick="clearSearch()">✕</button>
      </div>
      <div class="chips">
        <button class="chip on" data-m="all" onclick="setFilter(this)">전체</button>
        <button class="chip" data-m="part" onclick="setFilter(this)">자재번호</button>
        <button class="chip" data-m="name" onclick="setFilter(this)">개발품명</button>
      </div>
      <div class="res-meta">
        <span>검색 결과 <strong id="resCount">0</strong> 건</span>
        <span id="resLabel">전체 목록</span>
      </div>
      <div id="resultList" class="result-list"></div>
    </div>
  </div>

  <!-- ── ADMIN VIEW ── -->
  <div id="viewAdmin" style="display:none">

    <div id="adminMetaBox" class="meta-box" style="display:none">
      <div class="meta-box-icon">✅</div>
      <div class="meta-box-text">
        <strong id="adminMetaTitle"></strong>
        <span id="adminMetaDesc"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <span>📤</span>
        <span class="card-hdr-title">자재 데이터 등록</span>
      </div>
      <div class="card-body">
        <div class="tabs">
          <button class="tab on" id="tabPaste" onclick="switchTab('paste')">📋 붙여넣기</button>
          <button class="tab" id="tabFile" onclick="switchTab('file')">📁 파일</button>
          <button class="tab" id="tabSample" onclick="switchTab('sample')">🔧 샘플</button>
        </div>

        <div id="panePaste">
          <textarea id="pasteArea" placeholder="Excel에서 헤더 포함 전체 복사(Ctrl+A → Ctrl+C) 후 붙여넣기(Ctrl+V)&#10;탭 또는 콤마 구분 모두 지원합니다."></textarea>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnSavePaste" onclick="loadFromPaste()">☁️ 서버 저장 & 공유</button>
            <span id="pasteStatus"></span>
          </div>
        </div>

        <div id="paneFile" style="display:none">
          <div class="filedrop">
            <input type="file" accept=".csv,.txt,.tsv" onchange="loadFromFile(event)">
            <div class="filedrop-icon">📂</div>
            <p>CSV / TSV 파일 업로드</p>
            <p style="font-size:11px;margin-top:6px;color:#b0b8cc">Excel → 다른이름저장 → CSV 형식</p>
          </div>
          <span id="fileStatus" style="display:block;margin-top:10px"></span>
        </div>

        <div id="paneSample" style="display:none">
          <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">샘플 데이터(10행)로 기능을 테스트합니다.</p>
          <button class="btn btn-primary" onclick="loadSample()">🔧 샘플 데이터 저장</button>
          <span id="sampleStatus" style="margin-left:10px"></span>
        </div>

        <!-- Share URL -->
        <div class="share-box" id="shareBox" style="display:none">
          <div class="share-box-title">📎 직원 공유 URL</div>
          <div class="share-url-box" id="shareUrl"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <button class="btn btn-secondary" onclick="copyUrl()">📋 URL 복사</button>
            <span id="copyFeedback" style="font-size:12px;color:var(--green);display:none">✅ 복사됨!</span>
          </div>
          <p style="font-size:11px;color:#2563eb;margin-top:10px;line-height:1.6">
            💡 이 URL을 카카오톡·문자로 직원에게 공유하세요.<br>
            링크를 열면 최신 데이터를 자동으로 불러옵니다.
          </p>
        </div>
      </div>
    </div>

    <!-- Column info -->
    <div class="card" id="colCard" style="display:none">
      <div class="card-hdr">
        <span>🗂️</span>
        <span class="card-hdr-title">인식된 컬럼</span>
        <span class="card-hdr-sub" id="colCount"></span>
      </div>
      <div class="card-body">
        <div class="col-tags" id="colTags"></div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ── Config ───────────────────────────────────────────────────
const API_KEY = '$2a$10$r8UgrwCalEOhOv7ZjGVwa.kDU9lzMkOU5T4R0HWH6bvy25y17xjz6';
const API_BASE = 'https://api.jsonbin.io/v3/b';

// ── Column defs ──────────────────────────────────────────────
const COL = {
  PART:   ['자재'],
  NAME:   ['개발품명'],
  BIN:    ['저장bin','저장Bin','저장BIN'],
  PLANT:  ['플랜트수량','플랜트 수량','플랜트'],
  ABC:    ['ABC등급','ABC 등급'],
  STATUS: ['상태'],
  MODEL:  ['대표모델명'],
  QTY:    ['수량'],
};
const KEY_COLS = [...COL.BIN,...COL.PART,...COL.NAME,...COL.PLANT];

function fh(headers, cands) {
  for (const c of cands) if (headers.includes(c)) return c;
  return null;
}

// ── State ────────────────────────────────────────────────────
let allData = [], allHeaders = [], metaInfo = null, filterMode = 'all';

// ── Parse ────────────────────────────────────────────────────
function parseTSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const hdrs = lines[0].split(sep).map(h => h.trim().replace(/^["']|["']$/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(sep);
    if (cells.every(c => !c.trim())) continue;
    const row = {};
    hdrs.forEach((h, j) => { row[h] = (cells[j]||'').trim().replace(/^["']|["']$/g,''); });
    rows.push(row);
  }
  return { hdrs, rows };
}

const SAMPLE_DATA = `자재\t라벨\t개발품명\t대표모델명\tABC등급\t제품\t수량\t가용재고수\t플랜트수량\t예약수량\t상태\t저장bin
WP-10001\tWP-10001\t에어워셔 팬모터 A형\tCR-0520F\tA\t에어워셔\t30\t15\t12\t5\t정상\tA-01-3
WP-10002\tWP-10002\t공기청정기 헤파필터\tAP-1512HH\tA\t공기청정기\t50\t42\t38\t8\t정상\tB-03-1
WP-10003\tWP-10003\t밥솥 내솥 10인용\tCRP-P1009S\tB\t전기밥솥\t20\t0\t0\t0\t품절\t-
WP-10004\tWP-10004\t에어워셔 물통 어셈블리\tCR-0520F\tA\t에어워셔\t15\t9\t7\t3\t정상\tA-02-4
WP-10005\tWP-10005\t공기청정기 탈취필터\tAP-1512HH\tB\t공기청정기\t60\t55\t50\t0\t정상\tB-03-2
WP-10006\tWP-10006\t정수기 멤브레인 필터\tCHP-5800L\tA\t정수기\t25\t18\t14\t4\t정상\tC-05-1
WP-10007\tWP-10007\t밥솥 패킹 세트\tCRP-P1009S\tC\t전기밥솥\t100\t88\t80\t0\t정상\tD-01-7
WP-10008\tWP-10008\t에어워셔 DC팬모터 B형\tCR-1020F\tA\t에어워셔\t10\t3\t2\t2\t정상\tA-01-4
WP-10009\tWP-10009\t공기청정기 PCB 메인보드\tAP-2021C\tA\t공기청정기\t8\t2\t1\t1\t정상\tB-07-2
WP-10010\tWP-10010\t정수기 UV LED 모듈\tCHP-5800L\tA\t정수기\t12\t7\t5\t3\t정상\tC-05-3`;

// ── JSONBin API ──────────────────────────────────────────────
function getBinId() {
  // 1순위: URL hash
  const hash = window.location.hash;
  if (hash.startsWith('#bin=')) return hash.slice(5);
  // 2순위: localStorage
  return localStorage.getItem('mat_bin_id') || null;
}

async function fetchFromServer() {
  const binId = getBinId();
  if (!binId) return null;
  const res = await fetch(`${API_BASE}/${binId}/latest`, {
    method: 'GET',
    mode: 'cors',
    headers: {
      'X-Master-Key': API_KEY,
      'X-Bin-Meta': 'false'
    }
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('HTTP ' + res.status + ': ' + txt.slice(0, 100));
  }
  const json = await res.json();
  return json.record;
}

async function saveToServer(parsed) {
  const binId = getBinId();
  const payload = {
    hdrs: parsed.hdrs,
    rows: parsed.rows,
    at: new Date().toLocaleString('ko-KR')
  };
  const body = JSON.stringify(payload);

  let res;
  if (binId) {
    res = await fetch(`${API_BASE}/${binId}`, {
      method: 'PUT',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body
    });
  } else {
    res = await fetch(API_BASE, {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY,
        'X-Bin-Private': 'false'
      },
      body
    });
  }

  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('HTTP ' + res.status + ' — ' + txt.slice(0, 200));
  }
  const json = await res.json();
  const newBinId = (json.metadata && json.metadata.id) ? json.metadata.id : binId;
  if (!newBinId) throw new Error('Bin ID 없음. 응답: ' + JSON.stringify(json).slice(0, 200));

  localStorage.setItem('mat_bin_id', newBinId);
  history.replaceState(null, '', '#bin=' + newBinId);
  return { binId: newBinId, ...payload };
}

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const record = await fetchFromServer();
    if (record && record.rows && record.rows.length) {
      allHeaders = record.hdrs;
      allData = record.rows;
      metaInfo = { rows: record.rows.length, at: record.at };
      showSearchUI();
      doSearch();
      updateBadge();
      updateAdminMeta();
    } else {
      show('stateNoData');
      hide('stateLoading');
    }
  } catch(e) {
    // No bin yet or network error
    show('stateNoData');
    hide('stateLoading');
  }
});

// ── Apply & Save ─────────────────────────────────────────────
async function applyData(parsed, statusId) {
  if (!parsed || !parsed.rows.length) {
    showStatus(statusId, '❌ 파싱 실패. 형식을 확인하세요.', 'err');
    return;
  }
  showStatus(statusId, '⏳ 서버에 저장 중...', 'loading');
  disableSaveBtns(true);

  try {
    const result = await saveToServer(parsed);
    allHeaders = result.hdrs;
    allData = result.rows;
    metaInfo = { rows: result.rows.length, at: result.at };

    showStatus(statusId, `✅ ${result.rows.length}행 서버 저장 완료`, 'ok');
    updateBadge();
    updateAdminMeta();
    showColInfo();

    // Show share URL
    const shareUrl = window.location.origin + window.location.pathname + '#bin=' + result.binId;
    document.getElementById('shareUrl').textContent = shareUrl;
    show('shareBox');

    // Also refresh search view
    if (document.getElementById('stateSearch').style.display !== 'none') {
      doSearch();
    }
  } catch(e) {
    showStatus(statusId, '❌ 저장 실패: ' + e.message, 'err');
  }
  disableSaveBtns(false);
}

function disableSaveBtns(v) {
  ['btnSavePaste'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = v;
  });
}

// ── Load triggers ────────────────────────────────────────────
function loadFromPaste() { applyData(parseTSV(document.getElementById('pasteArea').value), 'pasteStatus'); }
function loadFromFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => applyData(parseTSV(ev.target.result), 'fileStatus');
  r.readAsText(file, 'UTF-8');
}
function loadSample() { applyData(parseTSV(SAMPLE_DATA), 'sampleStatus'); }

// ── UI helpers ───────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function showStatus(id, msg, type) {
  const el = document.getElementById(id); if (!el) return;
  el.className = 'pill pill-' + (type === 'ok' ? 'ok' : type === 'loading' ? 'loading' : 'err');
  el.textContent = msg;
}

function updateBadge() {
  const b = document.getElementById('hdrBadge');
  b.textContent = allData.length + '행';
  b.style.display = '';
}

function updateAdminMeta() {
  if (!metaInfo) return;
  show('adminMetaBox');
  document.getElementById('adminMetaTitle').textContent = '데이터 등록됨 — ' + metaInfo.rows + '행';
  document.getElementById('adminMetaDesc').textContent = '마지막 업데이트: ' + metaInfo.at + ' · 직원들이 공유 URL로 실시간 조회 가능합니다.';
}

function showColInfo() {
  show('colCard');
  document.getElementById('colCount').textContent = allHeaders.length + '개';
  document.getElementById('colTags').innerHTML = allHeaders.map(h => {
    const isKey = KEY_COLS.includes(h);
    return `<span class="col-tag" style="background:${isKey?'#fff3eb':'#f0f2f7'};color:${isKey?'var(--accent)':'var(--text2)'};font-weight:${isKey?700:400};border:1px solid ${isKey?'#ffd4b0':'var(--border)'}">${h}${isKey?' ★':''}</span>`;
  }).join('');
}

function showSearchUI() {
  hide('stateLoading');
  hide('stateNoData');
  show('stateSearch');
  if (metaInfo) document.getElementById('metaLine').textContent = '마지막 업데이트: ' + metaInfo.at + ' · ' + metaInfo.rows + '행';
}

function copyUrl() {
  const url = document.getElementById('shareUrl').textContent;
  const fb = document.getElementById('copyFeedback');
  const copy = () => { fb.style.display=''; setTimeout(()=>fb.style.display='none',2000); };
  navigator.clipboard ? navigator.clipboard.writeText(url).then(copy).catch(()=>{fallbackCopy(url);copy();}) : (fallbackCopy(url), copy());
}
function fallbackCopy(text) {
  const t = document.createElement('textarea'); t.value = text;
  document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
}

// ── Mode / Tab ───────────────────────────────────────────────
function switchMode(m) {
  const s = m === 'search';
  document.getElementById('viewSearch').style.display = s ? '' : 'none';
  document.getElementById('viewAdmin').style.display  = s ? 'none' : '';
  document.getElementById('btnSearch').classList.toggle('on', s);
  document.getElementById('btnAdmin').classList.toggle('on', !s);
  if (!s && allData.length) { updateAdminMeta(); showColInfo(); }
}

function switchTab(t) {
  ['paste','file','sample'].forEach(id => {
    const cap = id.charAt(0).toUpperCase() + id.slice(1);
    document.getElementById('tab'+cap).classList.toggle('on', id===t);
    document.getElementById('pane'+cap).style.display = id===t ? '' : 'none';
  });
}

// ── Search ───────────────────────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  filterMode = btn.dataset.m;
  doSearch();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  hide('clearBtn');
  doSearch();
}
function doSearch() {
  if (!allData.length) return;
  const input = document.getElementById('searchInput');
  const q = input.value.trim();
  document.getElementById('clearBtn').style.display = q ? '' : 'none';

  const ph = fh(allHeaders, COL.PART), nh = fh(allHeaders, COL.NAME);
  const results = !q ? [...allData] : allData.filter(row => {
    const p=(ph?row[ph]:'').toLowerCase(), n=(nh?row[nh]:'').toLowerCase(), qL=q.toLowerCase();
    if(filterMode==='part') return p.includes(qL);
    if(filterMode==='name') return n.includes(qL);
    return p.includes(qL)||n.includes(qL);
  });

  document.getElementById('resCount').textContent = results.length;
  document.getElementById('resLabel').textContent = q ? `"${q}" 검색` : '전체 목록';
  renderCards(results, q);
}

// ── Render ───────────────────────────────────────────────────
function hl(text, q) {
  if (!q||!text) return text||'-';
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx===-1) return text;
  return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}
function qtyTag(v) {
  const n=parseInt(v), cls=isNaN(n)||n===0?'qty-zero':n>0?'qty-pos':'qty-neg';
  return `<span class="qty-tag ${cls}">${v||'-'}</span>`;
}
function abcTag(v) {
  if(!v) return '-';
  const k = v.toUpperCase();
  const cls = 'abc-tag ' + (['A','B','C'].includes(k) ? 'abc-'+k : 'abc-C');
  return `<span class="${cls}">${v}</span>`;
}

function renderCards(results, q) {
  if (!results.length) {
    document.getElementById('resultList').innerHTML =
      `<div class="empty" style="padding:40px 20px"><div class="empty-icon">😶</div><p>검색 결과가 없습니다.</p></div>`;
    return;
  }
  const bh=fh(allHeaders,COL.BIN), ph=fh(allHeaders,COL.PART), nh=fh(allHeaders,COL.NAME);
  const plh=fh(allHeaders,COL.PLANT), ah=fh(allHeaders,COL.ABC);
  const sh=fh(allHeaders,COL.STATUS), mh=fh(allHeaders,COL.MODEL), qh=fh(allHeaders,COL.QTY);

  document.getElementById('resultList').innerHTML = results.map((row,i)=>{
    const binVal=bh?row[bh]:'', isEmpty=!binVal||binVal==='-';
    const statVal=sh?row[sh]:'', isOk=statVal&&statVal!=='품절'&&statVal!=='단종';
    return `<div class="rc" style="animation-delay:${Math.min(i*.05,.3)}s">
      <div class="rc-top">
        <div style="flex:1;min-width:0">
          <div class="rc-part">${hl(ph?row[ph]:'',q)}</div>
          <div class="rc-name">${hl(nh?row[nh]:'',q)}</div>
          ${mh?`<div class="rc-model">${row[mh]||''}</div>`:''}
        </div>
        <div class="bin-block">
          <div class="bin-lbl">저장 BIN</div>
          <div class="bin-val${isEmpty?' empty':''}">${binVal||'미지정'}</div>
        </div>
      </div>
      <div class="rc-body">
        ${plh?`<div><div class="rc-field-lbl">플랜트수량</div><div class="rc-field-val">${qtyTag(row[plh])}</div></div>`:''}
        ${qh?`<div><div class="rc-field-lbl">수량</div><div class="rc-field-val">${qtyTag(row[qh])}</div></div>`:''}
        ${ah?`<div><div class="rc-field-lbl">ABC</div><div class="rc-field-val">${abcTag(row[ah])}</div></div>`:''}
        ${sh?`<div style="grid-column:1/-1"><div class="rc-field-lbl">상태</div><div class="rc-field-val"><span class="stat-dot"><span class="dot ${isOk?'dot-ok':'dot-bad'}"></span>${statVal||'-'}</span></div></div>`:''}
      </div>
    </div>`;
  }).join('');
}
</script>
