<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 실시간 재고 관리</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px; max-width: 950px; margin: 0 auto;
        }
        h1 { color: #1e3c72; text-align: center; margin-bottom: 20px; font-weight: 800; }
        
        .search-area { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; color: #777; font-weight: bold; }
        .search-box { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #1e3c72; border-radius: 12px; outline: none; }

        .status { text-align: right; font-size: 12px; color: #666; margin-bottom: 10px; }
        .refresh-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f4f7ff; color: #1e3c72; }
        .loc-badge { background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        .loading { text-align: center; padding: 50px; font-weight: bold; color: #1e3c72; }
    </style>
</head>
<body>

<div class="container">
    <div class="status">
        <span id="lastUpdate">데이터 로딩 중...</span>
        <button class="refresh-btn" onclick="fetchData()">🔄 새로고침</button>
    </div>
    <h1> 재고 현황</h1>

    <div class="search-area">
        <input type="text" id="searchInput" class="search-box" placeholder="제품코드 또는 제품명 검색..." oninput="applyFilters()">
        <div class="filter-grid">
            <div class="filter-group">
                <label>대표모델명</label>
                <select id="modelFilter" onchange="applyFilters()"><option value="all">전체 모델</option></select>
            </div>
            <div class="filter-group">
                <label>최소 수량 기준</label>
                <input type="number" id="stockFilter" placeholder="0" oninput="applyFilters()">
            </div>
        </div>
    </div>

    <div id="loading" class="loading">구글 시트에서 데이터를 가져오고 있습니다...</div>

    <div style="overflow-x:auto;">
        <table id="inventoryTable" style="display:none;">
            <thead>
                <tr><th>코드</th><th>품명</th><th>LOCATION</th><th>대표모델</th><th>수량</th></tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 여기에 본인의 구글 시트 '웹에 게시' CSV 주소를 입력하세요.
    const SHEET_CSV_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vRkR0kD9Ftio5eDT3fbnhyXoyCXCNQYm0T1M1plvc_5Z4WtoZBJSwUIecRA2Bc5RaViZYT1erWQnl8x/pub?output=csv

    let inventoryData = [];

    window.onload = fetchData;

    async function fetchData() {
        if(SHEET_CSV_URL === '여기에_CSV_링크를_넣으세요') {
            document.getElementById('loading').innerHTML = "구글 시트 URL 설정이 필요합니다.";
            return;
        }

        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // 헤더 제외

            inventoryData = rows.filter(row => row.trim() !== '').map(row => {
                const cols = row.split(',');
                return {
                    code: cols[0]?.trim(),
                    name: cols[1]?.trim(),
                    loc: cols[2]?.trim(),
                    model: cols[3]?.trim(),
                    stock: Number(cols[4]?.trim() || 0)
                };
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('inventoryTable').style.display = 'table';
            document.getElementById('lastUpdate').textContent = "최근 업데이트: " + new Date().toLocaleTimeString();
            
            initModelFilter();
            applyFilters();
        } catch (error) {
            document.getElementById('loading').innerHTML = "데이터를 불러오는 데 실패했습니다.";
        }
    }

    function initModelFilter() {
        const select = document.getElementById('modelFilter');
        const models = [...new Set(inventoryData.map(d => d.model))].sort();
        select.innerHTML = '<option value="all">전체 모델</option>';
        models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = m;
            select.appendChild(opt);
        });
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const model = document.getElementById('modelFilter').value;
        const stock = Number(document.getElementById('stockFilter').value) || 0;

        const filtered = inventoryData.filter(item => {
            const mSearch = item.code.toLowerCase().includes(search) || item.name.toLowerCase().includes(search);
            const mModel = (model === 'all' || item.model === model);
            const mStock = item.stock >= stock;
            return mSearch && mModel && mStock;
        });

        const body = document.getElementById('inventoryBody');
        body.innerHTML = filtered.map(item => `
            <tr>
                <td style="font-weight:bold;">${item.code}</td>
                <td>${item.name}</td>
                <td><span class="loc-badge">${item.loc}</span></td>
                <td>${item.model}</td>
                <td style="color:${item.stock < 3 ? 'red' : 'black'}; font-weight:bold;">${item.stock}</td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
